{# Include: Like, dislike, and save buttons for the watch page. #}
<div class="video-actions">
    {% if user.is_authenticated %}
    <button class="action-btn {% if user_liked %}active-like{% endif %}"
            data-action="{% url 'like' video.pk %}?type=like"
            data-liked="like"
            id="btn-like">&#128077; <span id="like-count">{{ video.like_count }}</span></button>
    <button class="action-btn {% if user_disliked %}active-like{% endif %}"
            data-action="{% url 'like' video.pk %}?type=dislike"
            data-liked="dislike"
            id="btn-dislike">&#128078; <span id="dislike-count">{{ video.dislike_count }}</span></button>
    <button class="action-btn {% if is_saved %}active-like{% endif %}"
            data-action="{% url 'toggle_save' video.pk %}"
            id="btn-save">&#128278; <span id="save-label">{% if is_saved %}Saved{% else %}Save{% endif %}</span></button>
    {% else %}
    <a href="{% url 'login' %}">&#128077; {{ video.like_count }}</a>
    <a href="{% url 'login' %}">&#128078; {{ video.dislike_count }}</a>
    <a href="{% url 'login' %}">&#128278; Save</a>
    {% endif %}
</div>

{% if user.is_authenticated %}
<script>
(function () {
    var csrf = '{{ csrf_token }}';

    function fetchAction(url, callback) {
        fetch(url, {
            method: 'GET',
            headers: { 'X-CSRFToken': csrf, 'X-Requested-With': 'XMLHttpRequest' },
        }).then(function (r) { return r.json(); }).then(callback);
    }

    // Like / dislike
    document.getElementById('btn-like').addEventListener('click', function () {
        fetchAction(this.dataset.action, function (data) {
            document.getElementById('like-count').textContent    = data.like_count;
            document.getElementById('dislike-count').textContent = data.dislike_count;
            document.getElementById('btn-like').classList.toggle('active-like', data.liked);
            document.getElementById('btn-dislike').classList.toggle('active-like', data.disliked);
        });
    });

    document.getElementById('btn-dislike').addEventListener('click', function () {
        fetchAction(this.dataset.action, function (data) {
            document.getElementById('like-count').textContent    = data.like_count;
            document.getElementById('dislike-count').textContent = data.dislike_count;
            document.getElementById('btn-like').classList.toggle('active-like', data.liked);
            document.getElementById('btn-dislike').classList.toggle('active-like', data.disliked);
        });
    });

    // Save
    document.getElementById('btn-save').addEventListener('click', function () {
        var btn = this;
        fetchAction(btn.dataset.action, function (data) {
            btn.classList.toggle('active-like', data.saved);
            document.getElementById('save-label').textContent = data.saved ? 'Saved' : 'Save';
        });
    });
})();
</script>
{% endif %}
